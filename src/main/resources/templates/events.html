<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - OpenHour</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #FFFFFF;
            color: #1E1E1E;
            min-height: 100vh;
        }
        nav {
            background: #1B3A5C;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 32px;
        }
        nav .logo { font-size: 1.4rem; font-weight: 700; color: #FFFFFF; text-decoration: none; }
        nav a { color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: #FFFFFF; }
        nav a.active { color: #FFFFFF; }
        .container { max-width: 1000px; margin: 0 auto; padding: 32px 20px; }
        h1 { font-size: 2rem; margin-bottom: 24px; color: #1B3A5C; }
        .card {
            background: #F4F5F7;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #D9DCE0;
        }
        .card h2 { font-size: 1.2rem; margin-bottom: 16px; color: #1B3A5C; }
        .form-row { display: flex; gap: 12px; flex-wrap: nowrap; align-items: center; }
        .form-group { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .form-group-full { min-width: 100%; }
        .form-group label { font-size: 0.85rem; color: #6B7280; margin-bottom: 4px; }
        input, select, textarea {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #D9DCE0;
            background: #FFFFFF;
            color: #1E1E1E;
            font-size: 0.95rem;
            font-family: inherit;
        }
        textarea { resize: none; min-height: 60px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1B3A5C; }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #1B3A5C; color: white; margin-top: 12px; }
        .btn-primary:hover { background: #A3293D; }
        .time-group { display: flex; gap: 6px; align-items: center; }
        .time-group select { min-width: 70px; }
        .time-group span { color: #6B7280; font-weight: 600; }

        /* Event Cards */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .event-card {
            background: #FFFFFF;
            border: 1px solid #D9DCE0;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .event-card:hover { border-color: #1B3A5C; }
        .event-card h3 { font-size: 1.1rem; color: #1E1E1E; margin-bottom: 8px; }
        .event-meta { font-size: 0.85rem; color: #6B7280; margin-bottom: 4px; }
        .event-meta span { margin-right: 12px; }
        .event-desc { font-size: 0.9rem; color: #4B5563; margin: 12px 0; line-height: 1.4; }
        .event-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px; padding-top: 12px; border-top: 1px solid #D9DCE0;
        }
        .rsvp-count { font-size: 0.9rem; color: #1B3A5C; font-weight: 600; }
        .category-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .cat-social { background: #EDE9FE; color: #6D28D9; }
        .cat-academic { background: #DBEAFE; color: #1D4ED8; }
        .cat-sports { background: #D1FAE5; color: #059669; }
        .cat-other { background: #FEF3C7; color: #D97706; }
        .btn-rsvp {
            background: #1B3A5C; color: white; padding: 6px 16px;
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 0.85rem; font-weight: 600; transition: background 0.2s;
        }
        .btn-rsvp:hover { background: #A3293D; }
        .btn-rsvp.active { background: #A3293D; }
        .btn-rsvp.active:hover { background: #8a2233; }
        .empty-state { text-align: center; color: #6B7280; padding: 24px; font-style: italic; }
        @media (max-width: 700px) {
            .form-row { flex-direction: column; flex-wrap: wrap; }
            .events-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<nav>
    <a href="/" class="logo">OpenHour</a>
    <a href="/schedule">My Schedule</a>
    <a href="/events" class="active">Events</a>
    <a href="/discover">Discover</a>
</nav>

<div class="container">
    <h1>Campus Events</h1>

    <!-- Create Event Form -->
    <div class="card">
        <h2>Create an Event</h2>
        <form th:action="@{/events/add}" th:object="${newEvent}" method="post" onsubmit="return combineTimesEvent()">
            <input type="hidden" th:field="*{startTime}" id="eventStartTime" />
            <input type="hidden" th:field="*{endTime}" id="eventEndTime" />
            <div class="form-row">
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" th:field="*{eventName}" required />
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" th:field="*{eventDate}" required />
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{category}" required>
                        <option value="">Select...</option>
                        <option value="social">Social</option>
                        <option value="academic">Academic</option>
                        <option value="sports">Sports</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-row" style="margin-top: 4px;">
                <div class="form-group">
                    <label>Start Time</label>
                    <div class="time-group">
                        <select id="eventStartHour">
                            <option value="07">7 AM</option>
                            <option value="08">8 AM</option>
                            <option value="09" selected>9 AM</option>
                            <option value="10">10 AM</option>
                            <option value="11">11 AM</option>
                            <option value="12">12 PM</option>
                            <option value="13">1 PM</option>
                            <option value="14">2 PM</option>
                            <option value="15">3 PM</option>
                            <option value="16">4 PM</option>
                            <option value="17">5 PM</option>
                            <option value="18">6 PM</option>
                            <option value="19">7 PM</option>
                            <option value="20">8 PM</option>
                            <option value="21">9 PM</option>
                            <option value="22">10 PM</option>
                        </select>
                        <span>:</span>
                        <select id="eventStartMin">
                            <option value="00">00</option>
                            <option value="15">15</option>
                            <option value="30">30</option>
                            <option value="45">45</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>End Time</label>
                    <div class="time-group">
                        <select id="eventEndHour">
                            <option value="07">7 AM</option>
                            <option value="08">8 AM</option>
                            <option value="09">9 AM</option>
                            <option value="10" selected>10 AM</option>
                            <option value="11">11 AM</option>
                            <option value="12">12 PM</option>
                            <option value="13">1 PM</option>
                            <option value="14">2 PM</option>
                            <option value="15">3 PM</option>
                            <option value="16">4 PM</option>
                            <option value="17">5 PM</option>
                            <option value="18">6 PM</option>
                            <option value="19">7 PM</option>
                            <option value="20">8 PM</option>
                            <option value="21">9 PM</option>
                            <option value="22">10 PM</option>
                        </select>
                        <span>:</span>
                        <select id="eventEndMin">
                            <option value="00">00</option>
                            <option value="15">15</option>
                            <option value="30">30</option>
                            <option value="45">45</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" th:field="*{location}" required />
                </div>
            </div>
            <div class="form-row" style="margin-top: 12px;">
                <div class="form-group form-group-full">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="2"></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Create Event</button>
        </form>
    </div>

    <!-- Events List -->
    <div class="card">
        <h2>All Events</h2>
        <div th:if="${events.isEmpty()}" class="empty-state">
            No events yet. Be the first to create one!
        </div>
        <div class="events-grid" th:if="${!events.isEmpty()}">
            <div class="event-card" th:each="event : ${events}">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <h3 th:text="${event.eventName}">Study Group</h3>
                    <span class="category-badge"
                          th:classappend="${event.category == 'social'} ? 'cat-social' : (${event.category == 'academic'} ? 'cat-academic' : (${event.category == 'sports'} ? 'cat-sports' : 'cat-other'))"
                          th:text="${event.category}">social</span>
                </div>
                <div class="event-meta">
                    <span th:text="${event.eventDate}">2025-03-15</span>
                    <span th:text="${event.startTime} + ' - ' + ${event.endTime}">14:00 - 16:00</span>
                </div>
                <div class="event-meta">
                    <span th:text="'@ ' + ${event.location}">@ Library 204</span>
                </div>
                <p class="event-desc" th:text="${event.description}">Description here</p>
                <div class="event-footer">
                    <span class="rsvp-count" th:id="'count-' + ${event.id}" th:text="${event.rsvpCount} + ' going'">0 going</span>
                    <button class="btn-rsvp" th:id="'rsvp-' + ${event.id}" th:data-id="${event.id}" onclick="toggleRsvp(this)">RSVP</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function combineTimesEvent() {
    var sh = document.getElementById('eventStartHour').value;
    var sm = document.getElementById('eventStartMin').value;
    var eh = document.getElementById('eventEndHour').value;
    var em = document.getElementById('eventEndMin').value;
    document.getElementById('eventStartTime').value = sh + ':' + sm;
    document.getElementById('eventEndTime').value = eh + ':' + em;
    return true;
}

function getRsvpState() {
    try { return JSON.parse(localStorage.getItem('rsvpState') || '{}'); } catch(e) { return {}; }
}
function saveRsvpState(state) {
    localStorage.setItem('rsvpState', JSON.stringify(state));
}

function toggleRsvp(btn) {
    var id = btn.getAttribute('data-id');
    var state = getRsvpState();
    var isActive = state[id] === true;
    var action = isActive ? 'unrsvp' : 'rsvp';

    var formData = new FormData();
    formData.append('eventId', id);
    formData.append('action', action);

    fetch('/events/rsvp', { method: 'POST', body: formData })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            state[id] = !isActive;
            saveRsvpState(state);
            btn.classList.toggle('active', !isActive);
            btn.textContent = !isActive ? 'Going' : 'RSVP';
            document.getElementById('count-' + id).textContent = data.rsvpCount + ' going';
        });
}

document.addEventListener('DOMContentLoaded', function() {
    var state = getRsvpState();
    Object.keys(state).forEach(function(id) {
        if (state[id]) {
            var btn = document.getElementById('rsvp-' + id);
            if (btn) {
                btn.classList.add('active');
                btn.textContent = 'Going';
            }
        }
    });
});
</script>
</body>
</html>
